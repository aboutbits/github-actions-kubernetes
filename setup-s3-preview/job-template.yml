apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
  labels:
    app.kubernetes.io/managed-by: github-actions
    app.kubernetes.io/component: s3-preview-setup
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: prepare-s3-preview
          image: amazon/aws-cli:2
          command: [ "bash", "-c" ]
          args:
            - |
              set -e
              
              echo "### START $(date --iso-8601=seconds) ###"
              
              S3_ARGS=""
              if [ -n "$S3_ENDPOINT" ]; then
                S3_ARGS="--endpoint-url $S3_ENDPOINT"
              fi
              
              S3_MAIN_PREFIX="s3://$S3_BUCKET/${BASE_PREFIX}/"
              S3_PREVIEW_PREFIX="s3://$S3_BUCKET/preview-${PREVIEW_NUMBER}/"
              
              echo "Checking if $S3_PREVIEW_PREFIX already exists..."
              if [ "$(aws s3 $S3_ARGS ls "$S3_PREVIEW_PREFIX" | wc -l)" -gt 0 ]; then
                echo "$S3_PREVIEW_PREFIX already exists. Skipping setup."
                echo "Script finished successfully!"
                echo "### END $(date --iso-8601=seconds) ###"
                exit 0
              fi

              echo "Syncing from $S3_MAIN_PREFIX to $S3_PREVIEW_PREFIX ..."
              aws s3 $S3_ARGS sync "$S3_MAIN_PREFIX" "$S3_PREVIEW_PREFIX"
              
              echo "Script finished successfully!"
              echo "### END $(date --iso-8601=seconds) ###"
          env:
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: ${CONFIGMAP_NAME}
                  key: ${S3_BUCKET_KEY}
            - name: S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: ${CONFIGMAP_NAME}
                  key: ${S3_ENDPOINT_KEY}
                  optional: true
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: ${CONFIGMAP_NAME}
                  key: ${AWS_REGION_KEY}
            - name: AWS_DEFAULT_REGION
              valueFrom:
                configMapKeyRef:
                  name: ${CONFIGMAP_NAME}
                  key: ${AWS_REGION_KEY}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_NAME}
                  key: ${AWS_ACCESS_KEY_ID_KEY}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_NAME}
                  key: ${AWS_SECRET_ACCESS_KEY_KEY}
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_NAME}
                  key: ${AWS_SESSION_TOKEN_KEY}
                  optional: true
            - name: PREVIEW_NUMBER
              value: "${PREVIEW_NUMBER}"
