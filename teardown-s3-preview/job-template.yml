apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
  labels:
    app.kubernetes.io/managed-by: github-actions
    app.kubernetes.io/component: s3-preview-teardown
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: teardown-s3-preview
          image: amazon/aws-cli:2.34.31
          command: [ "bash", "-c" ]
          args:
            - |
              set -e
              
              echo "### START $(date --iso-8601=seconds) ###"
              
              if [ "$S3_FORCE_PATH_STYLE_ACCESS" = "true" ]; then
                aws configure set default.s3.addressing_style path
              fi
              
              S3_ARGS=""
              if [ -n "$S3_ENDPOINT" ]; then
                S3_ARGS="--endpoint-url $S3_ENDPOINT"
              fi
              
              S3_PREVIEW_PREFIX="s3://$S3_BUCKET/${PREVIEW_ROOT_FOLDER}/"
              
              echo "Checking if $S3_PREVIEW_PREFIX exists..."
              if [ "$(aws s3 $S3_ARGS ls "$S3_PREVIEW_PREFIX" | wc -l)" -eq 0 ]; then
                echo "$S3_PREVIEW_PREFIX does not exist or is empty. Skipping teardown."
                echo "Script finished successfully!"
                echo "### END $(date --iso-8601=seconds) ###"
                exit 0
              fi

              echo "Removing $S3_PREVIEW_PREFIX recursively..."
              aws s3 $S3_ARGS rm "$S3_PREVIEW_PREFIX" --recursive
              
              echo "Script finished successfully!"
              echo "### END $(date --iso-8601=seconds) ###"
          env:
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: ${CONFIGMAP_NAME}
                  key: ${S3_BUCKET_KEY}
            - name: S3_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: ${CONFIGMAP_NAME}
                  key: ${S3_ENDPOINT_KEY}
                  optional: true
            - name: AWS_DEFAULT_REGION
              valueFrom:
                configMapKeyRef:
                  name: ${CONFIGMAP_NAME}
                  key: ${S3_REGION_KEY}
            - name: S3_FORCE_PATH_STYLE_ACCESS
              valueFrom:
                configMapKeyRef:
                  name: ${CONFIGMAP_NAME}
                  key: ${S3_FORCE_PATH_STYLE_ACCESS_KEY}
                  optional: true
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_NAME}
                  key: ${S3_ACCESS_KEY_KEY}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ${SECRET_NAME}
                  key: ${S3_SECRET_KEY_KEY}
            - name: PREVIEW_ROOT_FOLDER
              value: "${PREVIEW_ROOT_FOLDER}"
